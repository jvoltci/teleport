name: Bug report
description: Report a problem with Teleport
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear, concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Teleport on Device A
        2. Click "Start session"
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browsers
    attributes:
      label: Browser(s) and OS
      placeholder: "Chrome 131 on macOS 14, Safari 17 on iOS 18"
    validations:
      required: true
  - type: input
    id: deployment
    attributes:
      label: Deployment
      description: Self-hosted, public demo, or local dev?
      placeholder: "self-hosted on Hetzner / public demo / local dev"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Browser console + signaling server logs (if available)
      render: shell
