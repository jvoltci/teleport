name: teleport-dev

services:
  signaling:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      CORS_ORIGINS: "*"
      LOG_LEVEL: DEBUG
    ports:
      - "4000:4000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    environment:
      NEXT_PUBLIC_SIGNALING_URL: ws://localhost:4000
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - signaling
